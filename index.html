<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chácara Lima</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    html { scroll-behavior: smooth; overflow-x: hidden; touch-action: manipulation; }
    body { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #00afee; border-radius: 10px; }
    
    /* Evita zoom automático em dispositivos móveis */
    input, select, textarea {
      font-size: 16px !important;
    }

    .footer-gradient {
      background: linear-gradient(to bottom, transparent, rgba(8, 47, 73, 0.98));
    }

    @keyframes pulse-whatsapp {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }
    .animate-whatsapp {
      animation: pulse-whatsapp 2s infinite;
    }
  </style>
</head>
<body class="bg-[#082f49] text-slate-800 selection:bg-[#00afee] selection:text-white relative overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Configuração Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAXoUar9ZJcV6qbv5WeXiDdEX4WMHhi2sA",
      authDomain: "chacara-lima-41dad.firebaseapp.com",
      projectId: "chacara-lima-41dad",
      storageBucket: "chacara-lima-41dad.firebasestorage.app",
      messagingSenderId: "259179060637",
      appId: "1:259179060637:web:fd4f093b6810377a536374"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'chacara-lima-app';

    const CAROUSEL_IMAGES = [
      "carrossel_1.jpg", 
      "carrossel_2.jpg",
      "carrossel_3.jpg"
    ];

    const STRUCTURES = [
      { id: 'quadra', title: "Quadra de Areia", iconClass: "fa-solid fa-volleyball", img: "quadra.jpg" },
      { id: 'piscina', title: "Piscina", iconClass: "fa-solid fa-water", img: "piscina.jpg" },
      { id: 'festa', title: "Salão de Festas", iconClass: "fa-solid fa-champagne-glasses", img: "salao.jpg" },
      { id: 'churrasqueira', title: "Área de Churrasco", iconClass: "fa-solid fa-fire", img: "churrasqueira.jpg" },
      { id: 'quartos', title: "2 Quartos", iconClass: "fa-solid fa-bed", img: "quartos.jpg" },
      { id: 'parquinho', title: "Parquinho", iconClass: "fa-solid fa-children", img: "parquinho.jpg" }
    ];

    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const getHolidays = (year) => {
      const holidays = [`${year}-01-01`, `${year}-04-21`, `${year}-05-01`, `${year}-09-07`, `${year}-10-12`, `${year}-11-02`, `${year}-11-15`, `${year}-11-20`, `${year}-12-25` ];
      const a = year % 19, b = Math.floor(year / 100), c = year % 100, d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451), month = Math.floor((h + l - 7 * m + 114) / 31) - 1, day = ((h + l - 7 * m + 114) % 31) + 1;
      const easter = new Date(year, month, day);
      const addDays = (date, days) => { const res = new Date(date); res.setDate(res.getDate() + days); return formatDate(res); };
      holidays.push(addDays(easter, -47), addDays(easter, -2), formatDate(easter), addDays(easter, 60));
      return holidays;
    };

    const formatSelectedDates = (dates) => {
      if (!dates || dates.length === 0) return '';
      if (dates.length === 1) return dates[0];
      if (dates.length === 2) return dates.join(' e ');
      return dates.slice(0, -1).join(', ') + ' e ' + dates[dates.length - 1];
    };

    function App() {
      const [user, setUser] = useState(null);
      const [bookings, setBookings] = useState([]);
      const [calendarSettings, setCalendarSettings] = useState({ unlockedMonths: [] });
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('home'); 
      const [loginUser, setLoginUser] = useState('');
      const [loginPass, setLoginPass] = useState('');
      const [loginError, setLoginError] = useState('');
      const [currentDate, setCurrentDate] = useState(new Date());
      const [selection, setSelection] = useState([]); 
      const [isModalOpen, setIsModalOpen] = useState(false);
      
      const [guestName, setGuestName] = useState('');
      const [guestPhone, setGuestPhone] = useState('');
      const [formError, setFormError] = useState('');

      const [selectedStructure, setSelectedStructure] = useState(null);
      const [isApproveModalOpen, setIsApproveModalOpen] = useState(false);
      const [bookingToApprove, setBookingToApprove] = useState(null);
      const [totalValue, setTotalValue] = useState('');
      const [paidValue, setPaidValue] = useState('');
      const [isGeneratingImage, setIsGeneratingImage] = useState(false);
      
      const [selectedFinanceMonth, setSelectedFinanceMonth] = useState(() => {
        const today = new Date();
        return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      });

      // Estado para controlar a falha do carregamento da imagem titulo-story
      const [titleError, setTitleError] = useState(false);

      const isAdmin = view === 'admin';

      useEffect(() => {
        auth.signInAnonymously();
        const unsubscribe = auth.onAuthStateChanged(setUser);
        
        return () => {
          unsubscribe();
        };
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubB = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings')
          .onSnapshot(snap => setBookings(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))), () => {});
        const unsubS = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('config')
          .onSnapshot(doc => doc.exists ? setCalendarSettings(doc.data()) : setCalendarSettings({unlockedMonths: []}), () => {});
        setLoading(false);
        return () => { unsubB(); unsubS(); };
      }, [user]);

      const toggleMonthLock = async (monthStr) => {
        const current = calendarSettings.unlockedMonths || [];
        const next = current.includes(monthStr) ? current.filter(m => m !== monthStr) : [...current, monthStr];
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('config').set({ unlockedMonths: next }, { merge: true });
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginUser === 'admin' && loginPass === '14021995') { 
          setView('admin'); 
          setLoginError(''); 
          setLoginUser(''); 
          setLoginPass('');
          window.scrollTo(0, 0);
        }
        else setLoginError('Credenciais inválidas.');
      };

      const handleLogout = () => {
        setView('home');
        window.scrollTo(0, 0);
      };

      const handleGenerateImage = () => {
        setIsGeneratingImage(true);
        setTimeout(async () => {
          const el = document.getElementById('story-calendar-container');
          // Atualizada a cor de fundo do canvas para o azul da logo
          const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#082f49', useCORS: true });
          const link = document.createElement('a');
          link.href = canvas.toDataURL('image/jpeg', 0.9);
          link.download = `Chacara-Lima-Story-${Date.now()}.jpg`;
          link.click();
          setIsGeneratingImage(false);
        }, 500);
      };

      const revenue = useMemo(() => {
        let expected = 0, paid = 0;
        const todayStr = formatDate(new Date());
        bookings.filter(b => b.status === 'booked').forEach(b => {
          if (b.dates?.[0]?.startsWith(selectedFinanceMonth)) {
            const tot = Number(b.totalValue) || 0, p = Number(b.paidValue) || 0;
            expected += tot;
            paid += (todayStr >= b.dates[0]) ? tot : p;
          }
        });
        return { expected, paid };
      }, [bookings, selectedFinanceMonth]);

      const handleDateClick = (date) => {
        const dateStr = formatDate(date);
        const existingBooking = bookings.find(b => b.dates?.includes(dateStr));
        if (existingBooking && existingBooking.status !== 'pending' && !isAdmin) return;
        if (isAdmin) { toggleAdminBlock(dateStr, existingBooking); return; }

        if (selection.length === 0) {
          setSelection([dateStr]);
        } else if (selection.length === 1) {
          const firstDate = new Date(selection[0] + 'T12:00:00'), clickedDate = new Date(dateStr + 'T12:00:00');
          const diffDays = Math.round(Math.abs(clickedDate - firstDate) / (1000 * 60 * 60 * 24));
          if (dateStr === selection[0]) setSelection([]);
          else if (diffDays === 1) setSelection([selection[0], dateStr].sort());
          else setSelection([dateStr]);
        } else if (selection.length === 2) {
          const clickedDate = new Date(dateStr + 'T12:00:00');
          const firstSelected = new Date(selection[0] + 'T12:00:00');
          const lastSelected = new Date(selection[1] + 'T12:00:00');
          
          if (dateStr === selection[0] || dateStr === selection[1]) {
            setSelection([dateStr]); // Reinicia se clicar num já selecionado
          } else {
            const diffToFirst = Math.round((firstSelected - clickedDate) / (1000 * 60 * 60 * 24));
            const diffToLast = Math.round((clickedDate - lastSelected) / (1000 * 60 * 60 * 24));
            
            if (diffToFirst === 1) {
              setSelection([dateStr, selection[0], selection[1]]);
            } else if (diffToLast === 1) {
              setSelection([selection[0], selection[1], dateStr]);
            } else {
              setSelection([dateStr]); // Reinicia se não for consecutivo
            }
          }
        } else {
          setSelection([dateStr]); // Reinicia se já houver 3 e clicar em outro
        }
      };

      const toggleAdminBlock = async (dateStr, existingBooking) => {
        if (existingBooking && existingBooking.status === 'blocked') {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(existingBooking.id).delete();
        } else if (!existingBooking) {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(`block_${dateStr}`).set({ dates: [dateStr], status: 'blocked', byAdmin: true });
        }
      };

      const confirmApproval = async () => {
        if (!bookingToApprove) return;
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(bookingToApprove.id).set({
          status: 'booked', totalValue: Number(totalValue), paidValue: Number(paidValue)
        }, { merge: true });
        setIsApproveModalOpen(false); setBookingToApprove(null); setTotalValue(''); setPaidValue('');
      };

      // Formatação do telemóvel ao vivo
      const handlePhoneChange = (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        if (value.length > 2) {
          value = `(${value.slice(0, 2)}) ${value.slice(2)}`;
        }
        if (value.length > 10) {
          value = `${value.slice(0, 10)}-${value.slice(10)}`;
        }
        setGuestPhone(value);
        setFormError('');
      };

      // Função Síncrona para evitar bloqueadores de pop-up em telemóveis
      const handleRequestDate = (e) => {
        e.preventDefault();
        
        // Validações
        if (guestName.trim().length < 3) {
          setFormError('Por favor, informe seu nome completo.');
          return;
        }
        if (guestPhone.replace(/\D/g, '').length < 10) {
          setFormError('Por favor, informe um WhatsApp válido com DDD.');
          return;
        }

        const msg = `Olá, gostaria de solicitar uma reserva!\nNome: ${guestName}\nWhatsApp: ${guestPhone}\nDatas: ${formatSelectedDates(selection)}`;
        const waUrl = `https://wa.me/5587981045332?text=${encodeURIComponent(msg)}`;
        
        // 1. Abre a aba/aplicativo do WhatsApp imediatamente (evita bloqueio no Safari/Chrome Mobile)
        const newWindow = window.open(waUrl, '_blank');
        
        // Fallback: Se o popup for bloqueado, navega na mesma aba (muito comum no iOS)
        if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
            window.location.href = waUrl;
        }

        // 2. Guarda a reserva no Firebase em segundo plano
        const docId = `res_${Date.now()}`;
        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(docId).set({
          dates: selection, status: 'pending', guestName, guestPhone, requestedAt: new Date().toISOString()
        }).catch(err => console.error("Erro ao guardar reserva:", err));
        
        // 3. Limpa o formulário
        setIsModalOpen(false); 
        setSelection([]); 
        setGuestName(''); 
        setGuestPhone('');
        setFormError('');
      };

      const renderCalendarDays = (isForImage = false) => {
        const year = currentDate.getFullYear(), month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate(), firstDay = new Date(year, month, 1).getDay();
        const days = [], today = new Date(); today.setHours(0,0,0,0);
        const holidays = getHolidays(year);

        for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className={isForImage ? "h-[90px]" : "h-[42px]"}></div>);

        for (let i = 1; i <= daysInMonth; i++) {
          const date = new Date(year, month, i), dateStr = formatDate(date);
          const booking = bookings.find(b => b.dates?.includes(dateStr)), isPast = date < today;
          
          let indicator = null;
          let bgStretch = null;

          let isSelectedOne = !isAdmin && !isForImage && selection.length === 1 && dateStr === selection[0];
          let isSelectedFirst = !isAdmin && !isForImage && selection.length >= 2 && dateStr === selection[0];
          let isSelectedMiddle = !isAdmin && !isForImage && selection.length === 3 && dateStr === selection[1];
          let isSelectedLast = !isAdmin && !isForImage && selection.length >= 2 && dateStr === selection[selection.length - 1];

          // Separamos o comportamento: Flexbox natural para o site, e posicionamento forçado (block) para a imagem do Story
          let btnClass = `relative z-10 rounded-full transition-colors outline-none ${isForImage ? 'block w-[80px] h-[80px] border-[4px]' : 'flex items-center justify-center w-[40px] h-[40px] border'}`;
          let textColor = isForImage ? "text-4xl" : "text-sm";
          let showDate = true;

          if (isPast) {
            btnClass += isForImage ? " border-slate-200 bg-slate-100" : " border-slate-100 bg-slate-50/50";
            textColor += isForImage ? " text-transparent" : " text-slate-400 opacity-50";
          } else if (booking && (booking.status === 'booked' || booking.status === 'blocked' || (booking.status === 'pending' && !isAdmin))) {
            if (isForImage) {
              // Aplica o fundo verde, remove a data e coloca a seta APENAS no story
              btnClass += " border-[#10b981] bg-[#10b981]";
              showDate = false;
              // Setinha com posicionamento absoluto para forçar a subida igual ao número
              indicator = (
                <i className="fa-solid fa-check absolute left-0 right-0 text-center text-white text-[42px] z-20 pointer-events-none" style={{ top: '30%', transform: 'translateY(-50%)' }}></i>
              );
            } else {
              // Mantém o visual clássico com risco vermelho no site
              btnClass += " border-red-100 bg-red-50";
              textColor += " text-red-400 line-through";
            }
          } else if (isSelectedOne) {
            btnClass += " bg-gradient-to-r from-[#1474b4] to-[#00afee] border-transparent shadow-lg";
            textColor += " text-white font-bold";
          } else if (isSelectedFirst) {
            btnClass += " bg-[#1474b4] border-transparent shadow-md";
            textColor += " text-white font-bold";
            if (date.getDay() !== 6) bgStretch = <div className="absolute right-0 z-0 pointer-events-none bg-[#1474b4]" style={{ top: 0, bottom: 0, margin: 'auto', width: '50%', height: isForImage ? '60px' : '30px' }}></div>;
          } else if (isSelectedMiddle) {
            btnClass += " bg-[#0b92d0] border-transparent shadow-md";
            textColor += " text-white font-bold";
            bgStretch = (
              <React.Fragment>
                {date.getDay() !== 0 && <div className="absolute left-0 z-0 pointer-events-none bg-[#0b92d0]" style={{ top: 0, bottom: 0, margin: 'auto', width: '50%', height: isForImage ? '60px' : '30px' }}></div>}
                {date.getDay() !== 6 && <div className="absolute right-0 z-0 pointer-events-none bg-[#0b92d0]" style={{ top: 0, bottom: 0, margin: 'auto', width: '50%', height: isForImage ? '60px' : '30px' }}></div>}
              </React.Fragment>
            );
          } else if (isSelectedLast) {
            btnClass += " bg-[#00afee] border-transparent shadow-md";
            textColor += " text-white font-bold";
            if (date.getDay() !== 0) bgStretch = <div className="absolute left-0 z-0 pointer-events-none bg-[#00afee]" style={{ top: 0, bottom: 0, margin: 'auto', width: '50%', height: isForImage ? '60px' : '30px' }}></div>;
          } else if (holidays.includes(dateStr)) {
            btnClass += " border-rose-200 bg-rose-50 hover:bg-rose-100";
            textColor += " text-rose-600 font-bold";
          } else {
            btnClass += " border-slate-200 bg-white hover:bg-slate-50";
            textColor += (date.getDay() === 0 || date.getDay() === 6) ? " text-slate-900 font-bold" : " text-slate-700 font-medium";
          }

          // Assegura que sábados e domingos sejam sempre negrito
          if ((date.getDay() === 0 || date.getDay() === 6) && !textColor.includes("font-bold")) {
            textColor += " font-bold";
          }

          // Apenas o Story recebe o 'absolute' e o 'top: 28%'. O site normal fica apenas com 'relative' para usar o centro do flexbox.
          days.push(
            <div key={i} className={`relative w-full flex items-center justify-center ${isForImage ? 'h-[90px]' : 'h-[42px]'}`}>
              {bgStretch}
              <button disabled={isPast || (!isAdmin && booking)} onClick={() => handleDateClick(date)} className={btnClass}>
                {showDate && (
                  <span 
                    className={`${isForImage ? 'absolute left-0 right-0 block' : 'relative block -top-[1px]'} z-10 text-center ${textColor}`} 
                    style={isForImage ? { top: '28%', transform: 'translateY(-50%)', lineHeight: 1 } : { lineHeight: 1 }}
                  >
                    {i}
                  </span>
                )}
                {indicator}
              </button>
            </div>
          );
        }
        return days;
      };

      const isMonthUnlocked = calendarSettings?.unlockedMonths?.includes(`${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`);

      return (
        <div className="font-sans flex flex-col min-h-screen">
          <div className="fixed inset-0 z-0 bg-[#082f49] overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-[#1474b4]/20 blur-[120px]"></div>
            <div className="absolute top-[30%] right-[-10%] w-[400px] h-[400px] rounded-full bg-[#00afee]/15 blur-[100px]"></div>
          </div>

          <nav className="fixed top-0 left-0 w-full z-50 bg-[#082f49]/80 backdrop-blur-xl border-b border-white/10 px-4 py-3">
            <div className="max-w-4xl mx-auto flex justify-between items-center">
              <img src="logo.png" alt="Chácara Lima" className="h-10 sm:h-14 cursor-pointer" onClick={() => { setView('home'); window.scrollTo(0,0); }} onError={(e) => e.target.style.display='none'} />
              <div className="flex items-center gap-2 sm:gap-3 ml-auto">
                {view === 'home' && (
                  <>
                    <a href="#reservas" className="px-6 py-2.5 sm:px-8 sm:py-3.5 bg-gradient-to-r from-[#1474b4] to-[#00afee] text-white text-[12px] sm:text-base font-black uppercase tracking-widest rounded-full shadow-lg hover:scale-105 transition-transform">RESERVAR</a>
                    <button onClick={() => { setView('login'); window.scrollTo(0, 0); }} className="px-4 py-2.5 border border-white/20 rounded-full text-white/70 hover:text-white text-[10px] sm:text-sm font-bold uppercase">Admin</button>
                  </>
                )}
                
                {view === 'login' && (
                  <button onClick={() => { setView('home'); window.scrollTo(0, 0); }} className="px-4 py-2.5 border border-white/20 rounded-full text-white/70 hover:text-white text-[10px] sm:text-sm font-bold uppercase">Voltar</button>
                )}

                {view === 'admin' && (
                  <>
                    <button onClick={() => { setView('home'); window.scrollTo(0, 0); }} className="px-4 py-2 border border-white/20 rounded-full text-white/70 hover:text-white text-[10px] sm:text-sm font-bold uppercase">Voltar</button>
                    <button onClick={handleLogout} className="px-4 py-2 border border-red-500/50 bg-red-500/10 text-red-400 rounded-full text-[10px] sm:text-sm font-black uppercase tracking-widest hover:bg-red-50 hover:text-white transition-colors">Sair</button>
                  </>
                )}
              </div>
            </div>
          </nav>

          <div className="flex-grow">
            {view === 'home' && (
              <main className="relative z-10 pt-24 pb-12 px-4 max-w-2xl mx-auto">
                <Carousel images={CAROUSEL_IMAGES} />

                <section className="grid grid-cols-2 gap-3 my-12">
                  {STRUCTURES.map(s => (
                    <div key={s.id} onClick={() => setSelectedStructure(s)} className="p-4 bg-white/10 backdrop-blur-md rounded-[1.5rem] border border-white/10 text-white flex items-center gap-3 cursor-pointer hover:bg-white/20">
                      <i className={`${s.iconClass} text-xl w-8 text-[#00afee]`}></i>
                      <span className="font-bold text-sm">{s.title}</span>
                    </div>
                  ))}
                </section>

                <section id="reservas" className="bg-white rounded-[2.5rem] p-6 shadow-xl relative">
                  {/* DESCRIÇÃO ACIMA DO CALENDÁRIO */}
                  <div className="text-center mb-6">
                    <span className="inline-block px-4 py-2 bg-[#1474b4]/10 rounded-full text-[10px] sm:text-xs font-black text-[#1474b4] uppercase tracking-widest">
                      Selecione 1 ou até 3 dias consecutivos
                    </span>
                  </div>

                  <div className="flex justify-between items-center mb-6 bg-slate-50 p-2 rounded-2xl">
                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-2"><i className="fa-solid fa-chevron-left"></i></button>
                    <h3 className="font-black text-slate-800 capitalize text-center flex-1">{currentDate.toLocaleString('pt-PT', { month: 'long', year: 'numeric' })}</h3>
                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-2"><i className="fa-solid fa-chevron-right"></i></button>
                  </div>
                  
                  <div className="grid grid-cols-7 text-center text-[10px] font-bold text-slate-400 uppercase mb-2">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                  </div>

                  <div className="relative">
                    <div className="grid grid-cols-7 gap-y-1">{renderCalendarDays()}</div>
                    {!isMonthUnlocked && (
                      <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center rounded-3xl">
                        <i className="fa-solid fa-lock text-3xl text-slate-300 mb-2"></i>
                        <p className="font-black text-slate-800 uppercase tracking-widest">Agenda Fechada</p>
                      </div>
                    )}
                  </div>

                  {/* LEGENDA */}
                  <div className="flex justify-center gap-4 mt-6 mb-2 text-[10px] font-bold text-slate-500 uppercase flex-wrap">
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-white border border-slate-200"></span> Livre</div>
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-red-50 border border-red-100 flex items-center justify-center overflow-hidden"><div className="w-[150%] h-[1px] bg-red-400 rotate-[-45deg]"></div></span> Indisponível</div>
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-gradient-to-r from-[#1474b4] to-[#00afee]"></span> Selecionado</div>
                  </div>

                  {selection.length > 0 && isMonthUnlocked && (
                    <div className="mt-6 p-4 bg-[#00afee]/10 rounded-2xl border border-[#00afee]/20 flex flex-col items-center gap-3">
                      <span className="font-black text-[#1474b4] text-sm">Reserva para: {formatSelectedDates(selection)}</span>
                      <button onClick={() => setIsModalOpen(true)} className="w-full py-3 bg-[#1474b4] text-white font-black rounded-xl uppercase tracking-widest text-xs shadow-md">Confirmar Solicitação</button>
                    </div>
                  )}
                </section>

                {/* BOTÃO VOLTAR AO TOPO (LIMPO COM TEXTO) */}
                <div className="flex justify-center mt-10 mb-4">
                  <button 
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    className="flex items-center gap-3 px-8 py-3 rounded-full border border-sky-800 bg-sky-900/30 text-sky-400 hover:text-white hover:bg-sky-800 hover:border-sky-600 transition-all text-[10px] font-black uppercase tracking-[0.2em]"
                  >
                    <i className="fa-solid fa-arrow-up"></i> Voltar ao topo
                  </button>
                </div>

              </main>
            )}

            {view === 'login' && (
              <div className="min-h-screen flex items-center justify-center p-4 relative z-10">
                <form onSubmit={handleLogin} className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
                  <img src="logo.png" className="h-16 mx-auto mb-6" onError={(e) => e.target.style.display='none'} />
                  <h2 className="text-xl font-black mb-6">Acesso Admin</h2>
                  {loginError && <p className="text-red-500 text-xs font-bold mb-4">{loginError}</p>}
                  <input type="text" placeholder="Utilizador" value={loginUser} onChange={e=>setLoginUser(e.target.value)} className="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-[#00afee]" />
                  <input type="password" placeholder="Palavra-passe" value={loginPass} onChange={e=>setLoginPass(e.target.value)} className="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-[#00afee]" />
                  <button className="w-full py-4 bg-[#00afee] text-white font-black rounded-2xl shadow-lg">ENTRAR</button>
                </form>
              </div>
            )}

            {view === 'admin' && (
              <main className="relative z-10 pt-24 pb-12 px-4 max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="space-y-6">
                  <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                    <h3 className="font-black text-lg mb-4 text-[#1474b4] flex items-center gap-2"><i className="fa-solid fa-dollar-sign"></i> Financeiro</h3>
                    <select value={selectedFinanceMonth} onChange={e => setSelectedFinanceMonth(e.target.value)} className="w-full mb-4 p-2 bg-slate-100 rounded-lg text-xs font-bold border-0 outline-none">
                      {Array.from({length: 12}).map((_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() - i);
                        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                        return <option key={val} value={val}>{d.toLocaleDateString('pt-PT', {month:'long', year:'numeric'})}</option>
                      })}
                    </select>
                    <div className="space-y-3">
                      <div className="p-3 bg-emerald-50 rounded-xl border border-emerald-100 flex justify-between">
                        <span className="text-xs font-bold text-emerald-700 uppercase">Recebido</span>
                        <span className="font-black text-emerald-600">R$ {revenue.paid}</span>
                      </div>
                      <div className="p-3 bg-slate-50 rounded-xl border border-slate-200 flex justify-between">
                        <span className="text-xs font-bold text-slate-500 uppercase">Total Fechado</span>
                        <span className="font-black text-slate-700">R$ {revenue.expected}</span>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                    <h3 className="font-black text-lg mb-4 text-[#1474b4] flex items-center gap-2"><i className="fa-solid fa-unlock"></i> Liberar Meses</h3>
                    <div className="max-h-48 overflow-y-auto custom-scrollbar space-y-2 pr-1">
                      {Array.from({length: 12}).map((_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() + i);
                        const mKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                        const active = calendarSettings.unlockedMonths?.includes(mKey);
                        return (
                          <div key={mKey} onClick={() => toggleMonthLock(mKey)} className={`p-3 rounded-xl border cursor-pointer flex justify-between items-center transition-all ${active ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                            <span className="text-xs font-bold capitalize">{d.toLocaleDateString('pt-PT', {month:'long', year:'numeric'})}</span>
                            <i className={`fa-solid ${active ? 'fa-toggle-on text-[#00afee]' : 'fa-toggle-off text-slate-300'} text-xl`}></i>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                    <button onClick={handleGenerateImage} className="w-full py-4 bg-slate-900 text-white font-black rounded-2xl flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-transform">
                      {isGeneratingImage ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-camera-retro"></i>} GERAR STORY
                    </button>
                    <p className="text-[10px] text-slate-400 font-bold mt-4 uppercase text-center">Toque nos dias do calendário abaixo para bloquear datas.</p>
                  </div>

                  <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                     <div className="grid grid-cols-7 text-center text-[10px] font-bold text-slate-400 uppercase mb-2">
                      <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
                     </div>
                     <div className="grid grid-cols-7 gap-y-1">{renderCalendarDays()}</div>
                  </div>
                </div>

                <div className="lg:col-span-2 space-y-4">
                  <div className="bg-white p-6 rounded-[2rem] shadow-xl">
                    <h3 className="font-black text-lg mb-6 border-b pb-4">Extratos e Solicitações</h3>
                    {bookings.length === 0 ? <p className="text-center py-10 text-slate-400 font-bold uppercase text-xs">Nenhuma movimentação registada.</p> : 
                      bookings.sort((a,b) => b.requestedAt.localeCompare(a.requestedAt)).map(b => (
                      <div key={b.id} className="p-5 rounded-3xl border border-slate-100 bg-slate-50/50 mb-4 relative overflow-hidden">
                        <div className={`absolute left-0 top-0 bottom-0 w-2 ${b.status === 'booked' ? 'bg-emerald-500' : b.status === 'blocked' ? 'bg-slate-400' : 'bg-amber-400'}`}></div>
                        <div className="flex justify-between items-start mb-3 pl-2">
                          <div>
                            <h4 className="font-black text-slate-800 text-lg leading-none">{b.guestName || "Bloqueio Manual"}</h4>
                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-2 flex items-center gap-1"><i className="fa-regular fa-calendar"></i> {b.dates?.join(' & ')}</p>
                          </div>
                          <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${b.status === 'booked' ? 'bg-emerald-100 text-emerald-700' : b.status === 'blocked' ? 'bg-slate-100 text-slate-600' : b.status === 'amber-100 text-amber-700'}`}>{b.status === 'booked' ? 'CONFIRMADA' : b.status === 'blocked' ? 'BLOQUEADO' : 'PENDENTE'}</span>
                        </div>
                        
                        {b.status === 'booked' && (
                          <div className="mt-4 p-4 bg-white rounded-2xl border border-slate-200 flex justify-between items-center text-[11px] font-black">
                            <div className="flex flex-col">
                              <span className="text-slate-400 uppercase tracking-widest text-[9px] mb-1">Sinal Pago</span>
                              <span className="text-emerald-600">R$ {b.paidValue}</span>
                            </div>
                            <div className="flex flex-col text-center">
                              <span className="text-slate-400 uppercase tracking-widest text-[9px] mb-1">Valor Total</span>
                              <span className="text-[#1474b4]">R$ {b.totalValue}</span>
                            </div>
                            <div className="flex flex-col text-right">
                              <span className="text-slate-400 uppercase tracking-widest text-[9px] mb-1">Restante</span>
                              <span className="text-amber-600">R$ {b.totalValue - b.paidValue}</span>
                            </div>
                          </div>
                        )}

                        <div className="flex justify-end gap-3 mt-5">
                          {b.status === 'pending' && <button onClick={() => {setBookingToApprove(b); setIsApproveModalOpen(true);}} className="px-5 py-2.5 bg-emerald-500 text-white rounded-xl text-xs font-black shadow-md shadow-emerald-500/20 uppercase tracking-widest text-center">Aprovar</button>}
                          <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(b.id).delete()} className="p-2.5 bg-white border border-slate-200 text-slate-300 hover:text-red-500 rounded-xl transition-colors"><i className="fa-solid fa-trash"></i></button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </main>
            )}
          </div>

          <footer className="relative z-10 footer-gradient pt-16 pb-8 px-4 border-t border-white/5">
            <div className="max-w-2xl mx-auto flex flex-col items-center gap-8">
              
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 w-full text-center">
                <div className="space-y-3">
                  <h4 className="text-white font-black uppercase tracking-widest text-xs opacity-50">Localização</h4>
                  <p className="text-slate-400 text-sm font-medium leading-relaxed">
                    Sítio Baraunas<br />
                    Granito - PE
                  </p>
                </div>
                
                <div className="space-y-3">
                  <h4 className="text-white font-black uppercase tracking-widest text-xs opacity-50">Contato</h4>
                  <a href="https://wa.me/5587981045332" target="_blank" className="text-slate-400 hover:text-[#00afee] transition-colors text-sm font-medium flex items-center justify-center gap-2">
                    <i className="fa-brands fa-whatsapp text-[#00afee]"></i> (87) 98104-5332
                  </a>
                  <p className="text-slate-400 text-sm font-medium flex items-center justify-center gap-2">
                    <i className="fa-regular fa-envelope text-[#00afee]"></i> contato@chacaralima.com
                  </p>
                </div>
                
                <div className="space-y-3">
                  <h4 className="text-white font-black uppercase tracking-widest text-xs opacity-50">Social</h4>
                  <div className="flex items-center justify-center gap-4">
                    <a href="https://instagram.com/chacaralima__" target="_blank" className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-[#00afee] transition-all"><i className="fa-brands fa-instagram"></i></a>
                  </div>
                </div>
              </div>

              <div className="w-full pt-8 border-t border-white/5 flex flex-col items-center mt-4 text-center">
                <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">
                  © 2026 Chácara Lima - Todos os direitos reservados
                </p>
              </div>
            </div>
          </footer>

          {/* ÁREA DE BOTÕES FLUTUANTES NO CANTO DIREITO */}
          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-center gap-4">
            {/* BOTÃO FLUTUANTE WHATSAPP */}
            <a 
              href="https://wa.me/5587981045332" 
              target="_blank" 
              rel="noopener noreferrer"
              className="w-14 h-14 bg-[#25D366] text-white rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-110 active:scale-95 animate-whatsapp"
            >
              <i className="fa-brands fa-whatsapp text-3xl"></i>
            </a>
        </div>

        {/* STORY PREVIEW (HIDDEN) */}
        {/* Atualizada a cor de fundo bg-[#082f49] para condizer com o site */}
        <div id="story-calendar-container" className="fixed left-[-9999px] w-[1080px] h-[1920px] bg-[#082f49] p-16 flex flex-col items-center justify-between text-white">
          <div className="w-full flex justify-center mt-24">
            {!titleError ? (
              <img src="titulo-story.png" alt="Datas Disponíveis" className="w-[650px] object-contain" onError={() => setTitleError(true)} />
            ) : (
              <div className="text-center">
                <p className="text-[40px] font-bold tracking-[0.3em] uppercase text-[#00afee] mb-2">Confira nossa</p>
                <h1 className="text-[100px] font-black leading-none uppercase">Datas Disponíveis</h1>
              </div>
            )}
          </div>
          <div className="w-full bg-white rounded-[4rem] p-12 text-slate-800">
             <h2 className="text-center text-5xl font-black mb-10 capitalize">{currentDate.toLocaleString('pt-PT', {month:'long', year:'numeric'})}</h2>
             <div className="grid grid-cols-7 text-center text-2xl font-black text-slate-700 mb-6 uppercase tracking-widest">
               <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
             </div>
             <div className="grid grid-cols-7 gap-y-6">{renderCalendarDays(true)}</div>
             
             {/* LEGENDA DO STORY */}
             <div className="flex justify-center items-center gap-16 mt-16 text-3xl font-black text-slate-400 uppercase tracking-widest">
               <div className="flex items-center gap-4">
                 <div className="w-[40px] h-[40px] rounded-full bg-white border-[3px] border-slate-200 shrink-0 shadow-sm"></div> 
                 <span className="relative -top-[16px]">Dias Livres</span>
               </div>
               <div className="flex items-center gap-4">
                 <div className="w-[40px] h-[40px] rounded-full bg-[#10b981] shrink-0 shadow-sm"></div> 
                 <span className="relative -top-[16px]">Dias Alugados</span>
               </div>
             </div>
          </div>
          <div className="flex flex-col items-center gap-8 pb-12">
            <img src="logo.png" style={{height: '180px'}} onError={(e) => e.target.style.display='none'} />
          </div>
        </div>

        {/* MODALS */}
        {selectedStructure && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90" onClick={() => setSelectedStructure(null)}>
              <div className="bg-[#0a0f1c] rounded-[3rem] overflow-hidden max-w-lg w-full relative border border-white/10 animate-fade-in-up shadow-2xl" onClick={e=>e.stopPropagation()}>
                <div className="relative h-80">
                  <img src={selectedStructure.img} className="w-full h-full object-cover" onError={(e) => e.target.src='https://placehold.co/600x400/0a0f1c/00afee?text=Imagem+Indisponível'} />
                  <div className="absolute inset-0 bg-gradient-to-t from-[#0a0f1c] to-transparent"></div>
                  <button onClick={() => setSelectedStructure(null)} className="absolute top-5 right-5 w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md"><i className="fa-solid fa-xmark"></i></button>
                </div>
                <div className="p-8">
                  <div className="flex items-center gap-3 mb-3">
                    <i className={`${selectedStructure.iconClass} text-[#00afee] text-2xl`}></i>
                    <h3 className="text-3xl font-black text-white">{selectedStructure.title}</h3>
                  </div>
                  <p className="text-slate-400 font-medium">Um espaço único, preparado para o seu conforto e os melhores momentos com a família e amigos na Chácara Lima.</p>
                </div>
              </div>
            </div>
          )}

          {isModalOpen && (
             <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
               <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl relative">
                 <button onClick={() => setIsModalOpen(false)} className="absolute top-5 right-5 text-slate-300"><i className="fa-solid fa-xmark"></i></button>
                 <h3 className="text-2xl font-black mb-1 text-slate-900">Solicitar Reserva</h3>
                 <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Datas: {formatSelectedDates(selection)}</p>
                 
                 {formError && (
                   <p className="text-red-500 text-[10px] font-black uppercase mb-4 text-center bg-red-50 p-2 rounded-xl border border-red-100">{formError}</p>
                 )}

                 <form onSubmit={handleRequestDate} className="space-y-4">
                   <input type="text" placeholder="Seu nome completo" required value={guestName} onChange={e=>{setGuestName(e.target.value); setFormError('');}} className="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-[#00afee] font-bold" />
                   <input type="tel" placeholder="WhatsApp (DDD)" required value={guestPhone} onChange={handlePhoneChange} maxLength="15" className="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-[#00afee] font-bold" />
                   <button className="w-full py-4 bg-[#1474b4] text-white font-black rounded-2xl shadow-lg uppercase tracking-widest">Enviar Pedido</button>
                 </form>
               </div>
             </div>
          )}

          {isApproveModalOpen && (
             <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
               <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
                 <h3 className="text-xl font-black mb-2 text-slate-900">Confirmar Valores</h3>
                 <p className="text-xs font-bold text-slate-400 uppercase mb-6">{bookingToApprove?.guestName}</p>
                 <div className="space-y-4">
                   <div>
                     <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Valor Total do Aluguer</label>
                     <input type="number" placeholder="Ex: 1000" value={totalValue} onChange={e=>setTotalValue(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" />
                   </div>
                   <div>
                     <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Sinal Recebido (Reserva)</label>
                     <input type="number" placeholder="Ex: 500" value={paidValue} onChange={e=>setPaidValue(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" />
                   </div>
                   <button onClick={confirmApproval} className="w-full py-4 bg-emerald-500 text-white font-black rounded-xl shadow-lg uppercase tracking-widest mt-2">Salvar e Aprovar</button>
                   <button onClick={() => setIsApproveModalOpen(false)} className="w-full py-2 text-slate-400 font-bold uppercase text-[10px]">Cancelar</button>
                 </div>
               </div>
             </div>
          )}

        </div>
      );
    }

    function Carousel({ images }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setCurrentIndex((prev) => (prev + 1) % images.length), 5000);
        return () => clearInterval(timer);
      }, [images.length]);

      return (
        <div className="relative w-full h-[40vh] rounded-[2.5rem] overflow-hidden shadow-2xl bg-black/20 mb-8 border border-white/10">
          {images.map((img, idx) => (
            <div 
              key={idx} 
              className={`absolute inset-0 w-full h-full bg-cover bg-center transition-opacity duration-1000 ease-in-out ${idx === currentIndex ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} 
              style={{ backgroundImage: `url(${img})` }} 
            />
          ))}
          <div className="absolute bottom-0 inset-x-0 h-24 bg-gradient-to-t from-black/70 to-transparent z-20 pointer-events-none"></div>
          <div className="absolute bottom-5 left-0 right-0 flex justify-center gap-2 z-30">
            {images.map((_, idx) => (
              <div key={idx} className={`h-1.5 rounded-full transition-all duration-500 ${idx === currentIndex ? 'w-6 bg-white shadow-[0_0_10px_rgba(255,255,255,0.5)]' : 'w-2 bg-white/40'}`} />
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
